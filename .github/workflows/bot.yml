name: Run YouTube Shorts Bot

on:
  repository_dispatch:
    types: [start_bot]

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'   # speeds up future runs (optional)

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir moviepy pillow google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client requests

      - name: Verify installations
        run: |
          python -c "import moviepy; print('MoviePy version:', moviepy.__version__)"
          python -c "import google.auth; print('Google Auth OK')"

      - name: Run bot worker
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python worker_github.py
